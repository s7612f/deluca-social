<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #080808;
  min-height: 100vh;
}

.grid {
  columns: 300px;
  column-gap: 3px;
  padding: 3px;
}

.item {
  break-inside: avoid;
  margin-bottom: 3px;
  overflow: hidden;
  display: block;
  background: #111;
  line-height: 0;
  position: relative;
}

.item:has(video) {
  cursor: pointer;
}

.item img {
  width: 100%;
  height: auto;
  display: block;
}

.item video {
  width: 100%;
  display: block;
}

.item video.portrait {
  aspect-ratio: 9 / 16;
  object-fit: cover;
}

.item video.square {
  aspect-ratio: 1 / 1;
  object-fit: cover;
}

.item iframe {
  width: 100%;
  aspect-ratio: 9 / 16;
  border: none;
  display: block;
}

.sound-icon {
  position: absolute;
  bottom: 10px;
  right: 10px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(0,0,0,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}

.item:has(video):hover .sound-icon {
  opacity: 1;
}

.sound-icon svg {
  width: 16px;
  height: 16px;
  fill: #fff;
}

.sound-icon .icon-on  { display: none; }
.sound-icon .icon-off { display: block; }

.item.unmuted .sound-icon { opacity: 1; }
.item.unmuted .sound-icon .icon-on  { display: block; }
.item.unmuted .sound-icon .icon-off { display: none; }
</style>
</head>

<script>
  document.querySelectorAll('.item:has(video)').forEach(item => {
    item.addEventListener('click', () => {
      const video = item.querySelector('video');
      const muting = !video.muted;
      if (!muting) {
        document.querySelectorAll('.item video').forEach(v => { v.muted = true; });
        document.querySelectorAll('.item').forEach(i => i.classList.remove('unmuted'));
      }
      video.muted = muting;
      item.classList.toggle('unmuted', !muting);
    });
  });
</script>
