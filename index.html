<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De Luca</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #080808;
  min-height: 100vh;
}

.grid {
  columns: 300px;
  column-gap: 3px;
  padding: 3px;
}

.item {
  break-inside: avoid;
  margin-bottom: 3px;
  overflow: hidden;
  display: block;
  background: #111;
  line-height: 0;
}

.item img {
  width: 100%;
  height: auto;
  display: block;
}

.item video {
  width: 100%;
  display: block;
}

.item video.portrait {
  aspect-ratio: 9 / 16;
  object-fit: cover;
}

.item video.square {
  aspect-ratio: 1 / 1;
  object-fit: cover;
}

.item iframe {
  width: 100%;
  aspect-ratio: 9 / 16;
  border: none;
  display: block;
}
</style>
</head>
<body>
<div class="grid">

  <div class="item">
    <img src="media/stories/dlc_20years_anniversary_story_r1.png" loading="lazy">
  </div>

  <div class="item">
    <img src="media/feed_posts/bold_new_menu.png" loading="lazy">
  </div>

  <div class="item">
    <video class="portrait" autoplay muted loop playsinline>
      <source src="media/stories/dlc_cta_generic_2_r1.mp4" type="video/mp4">
    </video>
  </div>

  <div class="item">
    <img src="media/feed_posts/dlc_20years_anniversary_r1.png" loading="lazy">
  </div>

  <div class="item">
    <img src="media/stories/dlc_20years_anniversary_story_r2.png" loading="lazy">
  </div>

  <div class="item">
    <video class="square" autoplay muted loop playsinline>
      <source src="media/feed_posts/cta.mp4" type="video/mp4">
    </video>
  </div>

  <div class="item">
    <img src="media/stories/dlc_new_menu_blue_r1.png" loading="lazy">
  </div>

  <div class="item">
    <img src="media/feed_posts/dlc_menu_blue_r1.png" loading="lazy">
  </div>

  <div class="item">
    <video class="portrait" autoplay muted loop playsinline>
      <source src="media/stories/cta.mp4" type="video/mp4">
    </video>
  </div>

  <div class="item">
    <img src="media/feed_posts/menu_cta.png" loading="lazy">
  </div>

  <div class="item">
    <img src="media/stories/generic story.png" loading="lazy">
  </div>

  <div class="item">
    <video class="square" autoplay muted loop playsinline>
      <source src="media/feed_posts/dlc_cta_generic_2_r1.mp4" type="video/mp4">
    </video>
  </div>

  <div class="item">
    <img src="media/stories/New Menu.png" loading="lazy">
  </div>

  <div class="item">
    <img src="media/stories/new menu no photos.png" loading="lazy">
  </div>

  <div class="item">
    <video class="portrait" autoplay muted loop playsinline>
      <source src="media/reels/cta .mp4" type="video/mp4">
    </video>
  </div>

  <div class="item">
    <video class="portrait" autoplay muted loop playsinline>
      <source src="media/reels/dlc_cta_generic_2_r1.mp4" type="video/mp4">
    </video>
  </div>

  <div class="item">
    <img src="media/feed_posts/20th_cta.png" loading="lazy">
  </div>

  <div class="item">
    <img src="media/feed_posts/dlc_bold_al_fresco.svg" loading="lazy">
  </div>

  <div class="item">
    <img src="media/stories/sketch story.png" loading="lazy">
  </div>

  <div class="item">
    <iframe src="media/stories/Dessert Menu .pdf"></iframe>
  </div>

</div>
</body>
</html>
