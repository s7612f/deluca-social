<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.4" fill="#F4EDE3" opacity="0.07"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="1080" height="1080" fill="#18170F"/>
  <!-- Dot texture -->
  <rect width="1080" height="1080" fill="url(#dots)"/>
  <!-- Inset border -->
  <rect x="24" y="24" width="1032" height="1032" fill="none" stroke="#F4EDE3" stroke-width="0.45"/>
  <!-- Corner brackets -->
  
  <!-- TL -->
  <polyline points="76,32 32,32 32,76" fill="none" stroke="#F4EDE3" stroke-width="1.2" stroke-linecap="square"/>
  <!-- TR -->
  <polyline points="1004,32 1048,32 1048,76" fill="none" stroke="#F4EDE3" stroke-width="1.2" stroke-linecap="square"/>
  <!-- BL -->
  <polyline points="76,1048 32,1048 32,1004" fill="none" stroke="#F4EDE3" stroke-width="1.2" stroke-linecap="square"/>
  <!-- BR -->
  <polyline points="1004,1048 1048,1048 1048,1004" fill="none" stroke="#F4EDE3" stroke-width="1.2" stroke-linecap="square"/>
  <!-- Bottom wordmark area -->
  <rect x="0" y="950" width="1080" height="130" fill="#F4EDE3" opacity="0.06"/>
  <line x1="60" y1="949" x2="1020" y2="949" stroke="#F4EDE3" stroke-width="0.5"/>
  <!-- Wordmark -->
  <text x="540" y="1002" text-anchor="middle" font-family="Cormorant Garamond,Georgia,serif" font-size="34" fill="#F4EDE3" font-weight="600" letter-spacing="10">DE LUCA</text>
  <line x1="340" y1="1012" x2="740" y2="1012" stroke="#F4EDE3" stroke-width="0.5"/>
  <text x="540" y="1032" text-anchor="middle" font-family="DM Sans,Arial,sans-serif" font-size="8.5" fill="#F4EDE3" font-weight="400" letter-spacing="3.5">ITALIAN RESTAURANT</text>
  
</svg>